y1_slave_simulator:
  ros__parameters:
    # Model path - relative to package share directory
    model_path: "robot_description/y1_description/mjcf/y1_slave.xml"
    
    # robot name，用来作为 topic 前缀，比如 /my_robot/rt/teleop/...
    robot_name: "y1_slave"
    
    # Robot type for gripper mapping logic
    # Y1 robots need stroke-to-angle conversion for gripper
    robot_type: "y1"

    # JointState.effort 来源（外力估计 / τ_model 对齐验证）：
    # - actuator_force（默认）：MIT PD+前馈 的作动器输出，一般 ≠ Pinocchio RNEA( q,q̇,q̈ )
    # - mj_inverse：本步仿真 q̈ 下 MuJoCo 逆动力学的 qfrc_inverse，与刚体方程一致；无外力且 MJCF≈URDF 时更易与 tau_model 对齐
    # joint_effort_source: mj_inverse

    # Publishing rate in Hz
    publish_rate: 500.0
    
    # Enable MuJoCo viewer window
    enable_viewer: true
    
    # Arm status publishing rate in Hz
    arm_status_rate: 10.0

    # Topic names
    joint_mit_control_topic: '/robot/joint_cmd'
    joint_state_topic: '/robot/joint_states'
    status_topic: '/robot/arm_status'
    end_pose_topic: '/robot/end_pose'

    # Gripper mapping configuration (for Y1 robot)
    # Joint7 is a revolute joint in real robot but prismatic in simulation
    enable_gripper_mapping: true
    gripper_joint_index: 6  # joint7 is at index 6 (0-based indexing)
    
    # End effector site configuration (Y1 has ee_link6 site defined in MJCF)
    enable_end_pose: true
    ee_site_name: 'ee_link6'


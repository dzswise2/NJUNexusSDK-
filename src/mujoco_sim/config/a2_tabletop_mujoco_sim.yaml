a2_tabletop_simulator:
  ros__parameters:
    # Model path - relative to package share directory
    model_path: "robot_description/a2_tabletop_description/mjcf/a2_tabletop.xml"
    
    # robot name，用来作为 topic 前缀，比如 /my_robot/rt/teleop/...
    robot_name: "a2_tabletop"
    
    # Robot type for gripper mapping logic
    # Supported types: y1, y1_master, y1_slave, nexus-arm, nexus_arm, piper, generic-a2
    robot_type: "generic-a2"

    # Publishing rate in Hz
    publish_rate: 500.0
    
    # Enable MuJoCo viewer window
    enable_viewer: true
    
    # Arm status publishing rate in Hz
    arm_status_rate: 10.0

    # Topic names
    joint_mit_control_topic: '/robot/joint_cmd'
    joint_state_topic: '/robot/joint_states'
    status_topic: '/robot/arm_status'
    end_pose_topic: '/robot/end_pose'

    # Gripper mapping configuration
    # a2_tabletop: finger_joint2 follows finger_joint1 via equality constraint
    # gripper is at index 7 (0-based: joint1~joint7 = 0~6, finger_joint1 = 7)
    enable_gripper_mapping: false
    gripper_joint_index: 7

    # End effector site configuration
    # a2_tabletop MJCF does not have ee_site defined, so disable end pose publishing
    enable_end_pose: false
    ee_site_name: 'ee_site'

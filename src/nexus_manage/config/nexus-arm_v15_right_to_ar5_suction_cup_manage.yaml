/**:
  ros__parameters:
    # ==================== 基本配置 ====================
    robot_name: "ar5"
    teleop_name: "nexus_arm_master"
    model_configuration: ["right_wrist", "right_end_effector"]

    # ==================== 状态机配置 ====================
    state_machine_rate: 100.0  # 状态机更新频率(Hz)

    # ==================== 缩放因子配置 ====================
    ee_pos_scaling_factor_x: 1.4
    ee_pos_scaling_factor_y: 1.4
    ee_pos_scaling_factor_z: 1.4
    ee_vel_scaling_factor_x: 1.0
    ee_vel_scaling_factor_y: 1.0
    ee_vel_scaling_factor_z: 1.0
    ee_rot_scaling_factor: 1.0
    ee_base_frame_rotation_z_deg: 90.0
    ee_rpy_limits: [-1.308997, 1.308997, 0.0, 0.0, 0.0, 0.0]
    # 吸盘 revolute↔revolute, 无需量纲转换
    gripper_scaling_factor: 1.0
    # 允许通过 marker_key 切换 gripper 值正负号（控制吸盘角度 0°/90°）
    gripper_sign_flip_enabled: true

    # ==================== 末端执行器配置 ====================
    # AR5 带吸盘：right_end_effector 为吸盘旋转角(rad), nexus_manage 透传
    end_effector_configs:
      right_wrist:
        type: "ee"
        teleop_pos_values: [0.0, -0.65, 0.47, 0.49, -0.17, 0.18]
        robot_pos_values: [0.0, 0.2, 0.0, 2.0, 0.0, 0.0, 0.0]
      right_end_effector:
        type: "gripper"
        teleop_pos_values: [0.0]
        robot_pos_values: [0.0]

    # ==================== ROS2 Topic 配置 ====================
    robot_human_data_topic: "/robot/human_data"
    robot_cmd_topic: "/robot/end_effector_cmd"
    robot_controller_state_topic: "/robot/controller_state"
    teleop_human_data_topic: "/teleop/human_data"
    teleop_pedal_state_topic: "/teleop/pedal_state"
    teleop_gripper_key_state_topic: "/teleop/gripper_key"
    teleop_controller_state_topic: "/teleop/controller_state"
    teleop_manager_node_state_topic: "/teleop/teleop_manager_state"

    # ==================== 模型推理配置 ====================
    inference_cmd_topic: "/inference/robot_ee_cmd"
    inference_config_service: "/inference/inference_config"
    double_click_interval: 0.5

    # ==================== ROS2 Service 配置 ====================
    robot_controller_config_service: "/robot/robot_controller_config"
    teleop_controller_config_service: "/teleop/teleop_controller_config"

/**:
  ros__parameters:
    gripper_config:
      # === 夹爪配置参数 ===
      # self_role - 当前这个控制器实例所控制的“本机夹爪”角色（用于 updateState 查表/范围选择）
      # nexus 作为主臂时应为 "master"
      self_role: "master"

      # master_stroke_table_path - 主臂查表文件路径
      # 用于将主臂电机旋转角度转换为夹爪开合距离（仿真和真实机器人都需要）
      master_stroke_table_path: "package://robot_controller/specs/gripper_stroke_table_nexus_v15_right.txt"
      
      # slave_stroke_table_path - 从臂查表文件路径（可选）
      # 如果配置，将自动从表中读取从臂开合度范围（用于归一化力反馈计算）
      # 如果有多个从臂，配置其中一个典型从臂的表
      slave_stroke_table_path: "package://robot_controller/specs/gripper_stroke_table_y1.txt"
      
      # 主臂和从臂开合度范围将从查表文件自动读取（表的第一行和最后一行）
      # 如果需要手动覆盖，可以取消注释：
      # master_max_opening_distance: 30.0  # 主臂最大开合距离 (mm)
      # master_min_opening_distance: 0.0   # 主臂最小开合距离 (mm)
      # slave_max_opening_distance: 102.5  # 从臂最大开合距离 (mm)
      # slave_min_opening_distance: 0.0    # 从臂最小开合距离 (mm)
      
      # === 夹爪控制参数（1维，用于夹爪控制）===
      # kp - 夹爪位置刚度
      kp: 3.0
      
      # kd - 夹爪速度阻尼
      kd: 0.3
      
      # target_angle_filter_alpha - 目标角度低通滤波系数
      # 范围：(0, 1]，越小滤波效果越强（响应越慢）
      # 0.2 表示当前值占20%，历史值占80%
      target_angle_filter_alpha: 1.0

      # === 夹爪力反馈参数（用于主从遥操作，独立于控制参数）===
      # force_feedback_gain - 主臂侧力反馈强度缩放（0-1）
      # 约定：force_feedback_gain > 0 即视为启用夹爪力反馈；=0 则禁用。
      force_feedback_gain: 1.0

      # 主臂侧不计算 gripper_force，仅接收从臂发布结果并映射为力矩
      # 这里显式关闭本地 FSM 计算，避免配置歧义
      force_feedback_use_fsm: false
      
      # force_to_torque_scale - 力到力矩的转换系数（有效半径，单位：m）
      # 用于将夹爪力反馈（N）转换为夹爪力矩（N·m）
      force_to_torque_scale: 0.0

      # return_to_max_* - 主臂夹爪回弹到最大开合度（力矩前馈，N·m）
      # 当不在最大开合度时，使用统一的定常力矩；接近完全弹开时，力矩线性下降至0
      # 设为 0 则关闭。
      return_to_max_tau_constant: 0.08  # 定常力矩大小（N·m）
      return_to_max_threshold: 0.2    # 归一化开合度阈值，距离完全张开还剩该值时开始线性下降
      # return_to_max_close_velocity_threshold - 闭合方向速度阈值（rad/s）
      # 仅当夹爪速度 v < -th（明显在闭合）时禁用回弹；用于滤掉接近0时的噪声误判。
      return_to_max_close_velocity_threshold: 2.0
      ff_holding_gripper_kd: 0.2  # 力反馈非零时主臂夹爪额外阻尼（加到 cmd.kd）

      # max_gripper_delta - 夹爪目标与当前角度差值上限（rad）
      max_gripper_delta: 0.1

      # max_gripper_delta_velocity_threshold - 仅在低速时启用 max_gripper_delta（rad/s）
      # 建议：设为较小值（例如 0.2），这样“快速开合”时不会被步进限幅干扰；停住/低速时仍可抑制突跳。
      max_gripper_delta_velocity_threshold: 2.0

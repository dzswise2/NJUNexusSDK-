slave_arm_adapter:
  ros__parameters:
    # robot name，用来作为 topic 前缀，比如 /ar5/robot/joint_cmd
    robot_name: "ar5"

    adapter_type: "ar5_suction_cup"   # "teleop" | "y1" | "ar5" | "ar5_suction_cup"

    # ==================== AR5 机械臂参数 ====================
    # right_arm_port 复用为 robot_ip（AR5控制器IP地址）
    right_arm_port: '192.168.9.160'
    # 本机IP地址（用于实时数据收发）
    right_arm_local_ip: '192.168.9.5'

    right_arm_feedback_rate: 500   # AR5 SDK力矩控制周期500Hz = 2ms
    right_arm_num_of_dofs: 8       # 7 AR5关节 + 1 吸盘关节

    # 启动时MoveJ到的初始关节位姿（rad），参考xMate拖拽位姿（仅7个臂关节）
    right_arm_init_joint_positions: [-1.57, 0.52, 0.0, 1.05, 0.0, 0.0, 0.0]

    # 外设HTTP服务地址（旋转吸盘控制）
    right_arm_peripheral_url: 'http://192.168.9.77:8080'

    # 负载信息（可选，不设置则默认为0）
    right_arm_load_mass: 1.917355            # 负载质量, kg
    right_arm_load_cog: [-0.0019173, 0.017286, -0.096068] # 质心 [x, y, z], m
    right_arm_load_inertia: [0.032281, 0.036663, 0.0089899] # 惯量 [ix, iy, iz], kg·m²

    # whether to enable robotic arm
    auto_enable: true

    # ==================== ROS2 topic ====================
    joint_mit_control_topic: 'robot/joint_cmd'
    joint_state_topic: 'robot/joint_states'
    status_topic: 'robot/arm_status'
    external_wrench_topic: 'robot/external_wrench'

    # 外设接口（AR5 suction cup 不使用 gripper_key/peripheral_cmd）
    gripper_key_state_topic: 'robot/gripper_key'
    peripheral_command_topic: 'robot/peripheral_cmd'

    # ==================== 关节配置 ====================
    # total number of degrees of freedom (7 arm + 1 suction cup)
    num_of_dofs: 8

    # names of all joints in order
    joint_names: ["AR5-5_07L-W4C4A2_joint_1", "AR5-5_07L-W4C4A2_joint_2",
                  "AR5-5_07L-W4C4A2_joint_3", "AR5-5_07L-W4C4A2_joint_4",
                  "AR5-5_07L-W4C4A2_joint_5", "AR5-5_07L-W4C4A2_joint_6",
                  "AR5-5_07L-W4C4A2_joint_7",
                  "AR5-5_07L-W4C4A2_joint_suction_cup"]

    # mapping indices from device joint order to ROS joint_states message order
    joint_mapping: [0, 1, 2, 3, 4, 5, 6, 7]

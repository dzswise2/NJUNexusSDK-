nexus_arm_simulator:
  ros__parameters:
    # Model path - relative to package share directory
    model_path: "robot_description/nexus-arm_description/mjcf/nexus-arm.xml"
    
    # robot name，用来作为 topic 前缀，比如 /my_robot/rt/teleop/...
    robot_name: "nexus_arm_master"
    
    # Robot type for gripper mapping logic
    # Supported types: y1, y1_master, y1_slave, nexus-arm, nexus_arm, piper, generic
    # For robots not needing gripper mapping, use 'generic' or their specific type
    robot_type: "nexus_arm"

    # Publishing rate in Hz
    publish_rate: 500.0
    
    # Enable MuJoCo viewer window
    enable_viewer: true
    
    # Arm status publishing rate in Hz
    arm_status_rate: 10.0

    # Topic names
    joint_mit_control_topic: '/teleop/joint_cmd'
    joint_state_topic: '/teleop/joint_states'
    status_topic: '/teleop/arm_status'
    end_pose_topic: '/teleop/end_pose'

    # Gripper mapping configuration
    # For nexus-arm: linear mapping stroke (0, 0.03) <-> angle (0, 1.467)
    # Velocity is set to 0, effort/torque is passed through directly
    enable_gripper_mapping: true
    gripper_joint_index: 6  # gripper_Joint is at index 6 (0-based indexing)

    # End effector site configuration
    # nexus-arm MJCF does not have ee_site defined, so disable end pose publishing
    # Or set ee_site_name to a site name if you add one to the MJCF
    enable_end_pose: true
    ee_site_name: 'ee_link6'  # Not used when enable_end_pose is false


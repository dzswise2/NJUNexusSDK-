/**:
  ros__parameters:
    gripper_config:
      # === AR5 夹爪配置（对标 Y1 gripper_config_y1.yaml）===
      # self_role - 从臂角色
      self_role: "slave"

      # AR5 无 stroke table，使用线性映射（min=0, max=110mm）
      # 不需要 master_stroke_table_path / slave_stroke_table_path

      # 从臂开合距离范围 (mm)，AR5 四杆联动 0 ~ 110mm
      slave_max_opening_distance: 110.0
      slave_min_opening_distance: 0.0

      # === 夹爪控制参数（1维，对标 Y1）===
      # kp/kd - bridge 已对 position actuator 绕过 MIT 公式, 直接设 ctrl=pos_des.
      # MJCF position actuator kp=100 负责位置跟踪. 此处保留作为将来实机参考.
      kp: 0.0
      kd: 0.0

      # target_angle_filter_alpha - 目标开距低通滤波系数，1.0 无滤波（对标 Y1）
      target_angle_filter_alpha: 1.0

      # === 夹爪力反馈参数（对标 Y1，仿真暂不启用 FSM）===
      force_feedback_use_fsm: false

      # === 夹爪步进限幅（对标 Y1 max_gripper_delta，AR5 单位 m 非 rad）===
      # max_gripper_delta - 每步最大开距变化 (m)，对标 Y1 0.3 rad
      max_gripper_delta: 0.3

      # kd_velocity_limit - kd 阻尼项速度误差上限 (m/s)，对标 Y1 10.0 rad/s
      kd_velocity_limit: 10.0

      # max_gripper_delta_velocity_threshold - 仅低速启用 delta 限幅 (m/s)，对标 Y1 15.0 rad/s
      max_gripper_delta_velocity_threshold: 15.0

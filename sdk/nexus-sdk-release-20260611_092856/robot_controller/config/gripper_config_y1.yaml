/**:
  ros__parameters:
    gripper_config:
      # === 夹爪配置参数 ===
      # self_role - 当前这个控制器实例所控制的“本机夹爪”角色（用于 updateState 查表/范围选择）
      # y1 作为从臂时应为 "slave"
      self_role: "slave"

      # master_stroke_table_path - 主臂查表文件路径（可选）
      # 如果配置，将自动从表中读取主臂开合度范围（用于归一化主臂发来的命令和计算力反馈）
      master_stroke_table_path: "package://robot_controller/specs/gripper_stroke_table_nexus_v15_right.txt"
      
      # slave_stroke_table_path - 从臂查表文件路径
      # 用于将从臂电机旋转角度转换为夹爪开合距离（仿真和真实机器人都需要）
      slave_stroke_table_path: "package://robot_controller/specs/gripper_stroke_table_y1.txt"
      
      # 主臂和从臂开合度范围将从查表文件自动读取（表的第一行和最后一行）
      # 如果需要手动覆盖，可以取消注释：
      # master_max_opening_distance: 30.0  # 主臂最大开合距离 (mm)
      # master_min_opening_distance: 0.0   # 主臂最小开合距离 (mm)
      # slave_max_opening_distance: 102.5  # 从臂最大开合距离 (mm)
      # slave_min_opening_distance: 0.0    # 从臂最小开合距离 (mm)
      
      # === 夹爪控制参数（1维，用于夹爪控制）===
      # kp - 夹爪位置刚度
      kp: 10.0
      
      # kd - 夹爪速度阻尼
      kd: 0.3
      
      # target_angle_filter_alpha - 目标角度低通滤波系数
      # 范围：(0, 1]，越小滤波效果越强（响应越慢）
      # 0.2 表示当前值占20%，历史值占80%
      target_angle_filter_alpha: 1.0

      # === 夹爪力反馈参数（用于主从遥操作，独立于控制参数）===
      # 从臂只负责计算并发布 gripper_force(N)，不需要配置"是否接收"或"力->力矩"参数。
      # 模型：状态机(FREE/HOLDING) + 常力tanh过渡
      # FREE: F=0
      # HOLDING: F = lower + (upper - lower) * tanh(t / tau)，t 为进入 HOLDING 后的驻留时间
      force_feedback_use_fsm: true

      # 状态机阈值（归一化差值 err = slave_norm - master_norm）
      ff_x_on: 0.08  # FREE->HOLDING 进入阈值（err=slave_norm-master_norm）
      ff_force_fadeout_range: 0.01  # 退出 HOLDING 后力反馈消退的主臂张开量（归一化）
      ff_hold_entry_time_s: 0.05  # 进入夹持需持续满足时长（s）
      ff_free_entry_time_s: 0.05  # 退出夹持需持续满足时长（s）
      ff_free_master_slave_diff: 0.1  # 主臂开合度 > 从臂 + 该值时立即退出 HOLDING
      ff_slave_velocity_threshold: 4.0  # 从臂夹爪低速阈值（rad/s），进入 HOLDING 的额外条件
      ff_reentry_cooldown_s: 0.4       # HOLDING->FREE 后禁止重新进入 HOLDING 的冷却时间（s）
      ff_exit_impedance_kp: 0.06  # 冷却期阻抗刚度（N），F = kp*(target-x) - kd*v
      ff_exit_impedance_kd: 0.00  # 冷却期阻抗阻尼（N·s）
      ff_ramp_tau_s: 0.02             # 进入 HOLDING 后从 lower 过渡到 upper 的时间常数（s）

      # 力反馈上下限（N，单边正向反馈；激活时输出落在 [lower, upper]）
      ff_force_lower_limit: 0.2
      ff_force_upper_limit: 0.4

      # max_gripper_delta - 夹爪目标与当前角度差值上限（rad）
      max_gripper_delta: 0.3
      # kd_velocity_limit - kd 阻尼项速度误差上限（rad/s，超过按此值计算阻尼）
      kd_velocity_limit: 10.0
      # max_gripper_delta_velocity_threshold - 仅在低速时启用 max_gripper_delta（rad/s，和 FSM 判定解耦）
      max_gripper_delta_velocity_threshold: 15.0

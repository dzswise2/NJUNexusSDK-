/**:
  ros__parameters:
    gripper_config:
      # === 夹爪配置参数（对标 gripper_config_y1.yaml）===
      # self_role - 当前这个控制器实例所控制的"本机夹爪"角色（用于 updateState 查表/范围选择）
      # Franka Hand 作为从臂时应为 "slave"
      self_role: "slave"

      # Franka Hand 使用 URDF 线性映射（prismatic, m），不使用 stroke table。
      # 主臂范围仅用于力反馈归一化，可选手动配置或取消注释 master_stroke_table_path：
      # master_stroke_table_path: "package://robot_controller/specs/gripper_stroke_table_nexus_v15_right.txt"

      # 主臂开合距离范围 (mm)，来自 nexus-arm-v15-right stroke table 最大位移
      master_max_opening_distance: 20.58
      master_min_opening_distance: 0.0

      # 从臂开合距离范围 (mm)，来自 URDF fr3v2_1_finger_joint1 upper=0.04 m
      # 重算: python3 scripts/derive_franka_gripper_mapping.py
      slave_max_opening_distance: 40.0
      slave_min_opening_distance: 0.0

      # === 夹爪控制参数（1维，用于夹爪控制）===
      # kp - 夹爪位置刚度（仿真由 mujoco_sim MIT 控制消费）
      kp: 500.0

      # kd - 夹爪速度阻尼
      kd: 0.3

      # target_angle_filter_alpha - 目标开距低通滤波系数
      # 范围：(0, 1]，越小滤波效果越强（响应越慢）
      target_angle_filter_alpha: 1.0

      # === 夹爪力反馈参数（用于主从遥操作，独立于控制参数）===
      # 从臂只负责计算并发布 gripper_force(N)，不需要配置"是否接收"或"力->力矩"参数。
      # 模型：状态机(FREE/HOLDING) + 常力 tanh 过渡
      # 仿真阶段关闭；主从归一化范围不一致，实机力反馈需单独标定后再开
      force_feedback_use_fsm: false

      # 状态机阈值（归一化差值 err = slave_norm - master_norm）
      ff_x_on: 0.08
      ff_force_fadeout_range: 0.01
      ff_hold_entry_time_s: 0.05
      ff_free_entry_time_s: 0.05
      ff_free_master_slave_diff: 0.1
      # Franka finger_joint1 为 prismatic (m/s)，阈值按 m/s 标定（URDF velocity limit=0.2 m/s）
      ff_slave_velocity_threshold: 0.05
      ff_reentry_cooldown_s: 0.4
      ff_exit_impedance_kp: 0.06
      ff_exit_impedance_kd: 0.00
      ff_ramp_tau_s: 0.02

      # 力反馈上下限（N，单边正向反馈；激活时输出落在 [lower, upper]）
      ff_force_lower_limit: 0.2
      ff_force_upper_limit: 0.4

      # === 夹爪步进限幅（对标 Y1，Franka 单位 m 非 rad）===
      # max_gripper_delta - 每步最大开距变化 (m)，行程 40 mm，取 10 mm/步
      max_gripper_delta: 0.01

      # kd_velocity_limit - kd 阻尼项速度误差上限 (m/s)
      kd_velocity_limit: 0.2

      # max_gripper_delta_velocity_threshold - 仅低速时启用 delta 限幅 (m/s)
      max_gripper_delta_velocity_threshold: 0.15
